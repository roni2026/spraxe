services:
  - type: web
    name: spraxe-next
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Set these in Render Dashboard (do NOT commit secrets)
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      # Optional (email, analytics, etc.)
      - key: BREVO_API_KEY
        sync: false
      - key: NEXT_PUBLIC_GA_MEASUREMENT_ID
        sync: false

      # Sensible defaults
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      # Node 20 (LTS). Next.js 14 fixed the streaming "ReadableStream is already
      # closed" crash that affected Next 13.5, and @supabase/supabase-js requires
      # Node 20+.
      - key: NODE_VERSION
        value: "20.18.0"

